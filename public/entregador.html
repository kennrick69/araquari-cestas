<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Araquari Cestas - Entregador</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--text:#f0f0f5;--text2:#a0a0b0;--text3:#606070;--green:#10b981;--orange:#E8850C;--red:#ef4444;--yellow:#f39c12;--blue:#3b82f6;--glass:rgba(18,18,26,.95)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.topbar{background:var(--glass);backdrop-filter:blur(20px);padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:16px;font-weight:800;color:var(--green)}
.topbar .sub{font-size:11px;color:var(--text3)}
.top-btn{background:var(--border);color:var(--text2);border:none;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}

.login-box{max-width:360px;margin:80px auto;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 32px;text-align:center}
.login-box h2{font-size:20px;margin-bottom:8px;color:var(--green)}
.login-box p{font-size:13px;color:var(--text3);margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;margin-bottom:16px;text-align:center}
.login-box input:focus{outline:none;border-color:var(--green)}
.login-box .enter-btn{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer}
.login-error{color:var(--red);font-size:12px;margin-top:12px;display:none}

.content{padding:16px;max-width:600px;margin:0 auto}

.stats-row{display:flex;gap:8px;margin-bottom:16px}
.stat-box{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.stat-box .num{font-size:20px;font-weight:900}
.stat-box .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;margin-top:2px}

.tabs{display:flex;gap:6px;margin-bottom:16px}
.tab{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;background:var(--card);border:1px solid var(--border);color:var(--text3);position:relative}
.tab.active{background:var(--green);border-color:var(--green);color:#fff}
.tab .cnt{background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:10px;margin-left:4px}

.ocard{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden}
.ocard-top{padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.ocard-code{font-weight:900;font-size:14px;color:var(--green);letter-spacing:.5px}
.ocard-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.b-pronto{background:#10b98120;color:var(--green)}
.b-caminho{background:#E8850C20;color:var(--orange)}
.b-separacao{background:#f39c1220;color:var(--yellow)}
.b-confirmado{background:#3b82f620;color:var(--blue)}
.b-entregue{background:#10b98120;color:var(--green)}

.ocard-body{padding:0 16px 12px;font-size:13px;color:var(--text2);line-height:1.7}
.ocard-body strong{color:var(--text)}

.ocard-coords{padding:6px 16px;background:var(--bg);font-size:11px;color:var(--text3);display:flex;justify-content:space-between;align-items:center}
.ocard-coords span{font-family:monospace}
.copy-btn{background:var(--border);color:var(--text2);border:none;padding:4px 8px;border-radius:6px;font-size:10px;cursor:pointer;font-weight:700}

.ocard-map{height:180px;width:100%}
.ocard-map .leaflet-container{height:100%;width:100%}

.nav-row{padding:10px 16px;display:flex;gap:6px;border-top:1px solid var(--border);background:var(--bg)}
.nav-btn{flex:1;padding:8px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;display:block;color:#fff}
.nav-google{background:var(--blue)}
.nav-waze{background:#33ccff;color:#000}
.nav-whats{background:#25d366}

.status-action{padding:12px 16px;border-top:2px solid var(--border)}
.status-btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;color:#fff;display:block;text-align:center;letter-spacing:.5px}
.status-btn:active{transform:scale(0.98);opacity:0.9}
.status-btn.separar{background:var(--yellow);color:#000}
.status-btn.pronto{background:var(--orange)}
.status-btn.sair{background:var(--blue)}
.status-btn.entregar{background:var(--green)}
.status-btn:disabled{opacity:0.5;cursor:not-allowed}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .ico{font-size:48px;margin-bottom:12px}
.spin{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .6s linear infinite;margin:30px auto}
@keyframes sp{to{transform:rotate(360deg)}}

.d-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:999;animation:fadeIn .3s;max-width:90%}
.d-toast.success{background:#10b981;color:#fff}
.d-toast.error{background:#ef4444;color:#fff}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div style="font-size:36px;margin-bottom:12px">🚚</div>
        <h2>Área do Entregador</h2>
        <p>Digite o código de acesso</p>
        <input type="password" id="driver-token" placeholder="Código do entregador" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="enter-btn" onclick="doLogin()">Entrar</button>
        <div class="login-error" id="login-error">Código inválido</div>
    </div>
</div>

<div id="panel" style="display:none">
    <div class="topbar">
        <div>
            <h1>🚚 Entregador</h1>
            <div class="sub">Araquari Cestas</div>
        </div>
        <div style="display:flex;gap:6px">
            <button class="top-btn" onclick="loadOrders()">🔄</button>
            <button class="top-btn" onclick="doLogout()">Sair</button>
        </div>
    </div>
    <div class="content">
        <div class="stats-row" id="stats"></div>
        <div class="tabs" id="tabs">
            <div class="tab active" onclick="switchTab('prontos',this)">🎁 Prontos <span class="cnt" id="c-prontos">0</span></div>
            <div class="tab" onclick="switchTab('caminho',this)">🚚 A Caminho <span class="cnt" id="c-caminho">0</span></div>
            <div class="tab" onclick="switchTab('entregues',this)">✅ Entregues</div>
        </div>
        <div id="list"><div class="spin"></div></div>
    </div>
</div>

<div id="toast-area"></div>

<script>
const API = '/api/admin';
let TK = localStorage.getItem('driver_token') || '';
let orders = [];
let curTab = 'prontos';
let maps = {};

function doLogin() {
    TK = document.getElementById('driver-token').value.trim();
    if(!TK) return;
    fetch(API+'/dashboard', {headers:{'x-admin-token':TK}})
        .then(function(r) { if(!r.ok) throw new Error(); return r.json(); })
        .then(function() { localStorage.setItem('driver_token', TK); showPanel(); })
        .catch(function() { document.getElementById('login-error').style.display = 'block'; });
}

function doLogout() {
    TK = ''; localStorage.removeItem('driver_token');
    document.getElementById('panel').style.display = 'none';
    document.getElementById('login-screen').style.display = 'block';
}

function showPanel() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    loadOrders();
}

function toast(msg, type) {
    var el = document.createElement('div');
    el.className = 'd-toast ' + (type || 'success');
    el.textContent = msg;
    document.getElementById('toast-area').appendChild(el);
    setTimeout(function() { el.style.opacity = '0'; setTimeout(function() { el.remove(); }, 300); }, 3000);
}

async function loadOrders() {
    var el = document.getElementById('list');
    el.innerHTML = '<div class="spin"></div>';
    maps = {};
    try {
        var all = [];
        var statuses = ['confirmado','separacao','pronto','a_caminho','entregue'];
        for(var i = 0; i < statuses.length; i++) {
            var r = await fetch(API+'/pedidos?status='+statuses[i]+'&limite=50', {headers:{'x-admin-token':TK}});
            var d = await r.json();
            if(d.pedidos) all = all.concat(d.pedidos);
        }
        orders = all;
        updateStats();
        render();
    } catch(e) {
        el.innerHTML = '<div class="empty-state"><div class="ico">⚠️</div><p>Erro ao carregar</p></div>';
    }
}

function updateStats() {
    var p = orders.filter(function(o) { return o.status === 'pronto' || o.status === 'separacao' || o.status === 'confirmado'; }).length;
    var c = orders.filter(function(o) { return o.status === 'a_caminho'; }).length;
    var e = orders.filter(function(o) { return o.status === 'entregue'; }).length;
    document.getElementById('c-prontos').textContent = p;
    document.getElementById('c-caminho').textContent = c;
    document.getElementById('stats').innerHTML =
        '<div class="stat-box"><div class="num" style="color:var(--yellow)">' + p + '</div><div class="lbl">Prontos</div></div>' +
        '<div class="stat-box"><div class="num" style="color:var(--orange)">' + c + '</div><div class="lbl">A Caminho</div></div>' +
        '<div class="stat-box"><div class="num" style="color:var(--green)">' + e + '</div><div class="lbl">Entregues</div></div>';
}

function switchTab(t, el) {
    curTab = t;
    document.querySelectorAll('.tab').forEach(function(tab) { tab.classList.remove('active'); });
    if(el) el.classList.add('active');
    maps = {};
    render();
}

function render() {
    var el = document.getElementById('list');
    var filtered;
    if(curTab === 'prontos') filtered = orders.filter(function(o) { return ['confirmado','separacao','pronto'].indexOf(o.status) >= 0; });
    else if(curTab === 'caminho') filtered = orders.filter(function(o) { return o.status === 'a_caminho'; });
    else filtered = orders.filter(function(o) { return o.status === 'entregue'; }).slice(0, 20);

    if(!filtered.length) {
        var msgs = {prontos:'Nenhum pedido pronto',caminho:'Nenhuma entrega em andamento',entregues:'Nenhuma entrega concluída'};
        var icons = {prontos:'📭',caminho:'🚚',entregues:'✅'};
        el.innerHTML = '<div class="empty-state"><div class="ico">' + icons[curTab] + '</div><p>' + msgs[curTab] + '</p></div>';
        return;
    }

    var html = '';
    for(var i = 0; i < filtered.length; i++) {
        html += renderCard(filtered[i]);
    }
    el.innerHTML = html;
    setTimeout(function() { initMaps(filtered); }, 150);
}

function renderCard(p) {
    var addr = [p.endereco_rua, p.endereco_numero, p.endereco_bairro, p.endereco_cidade].filter(Boolean).join(', ');
    var lat = parseFloat(p.latitude);
    var lng = parseFloat(p.longitude);
    var hasGeo = lat && lng && lat !== 0;
    var tel = (p.recebedor_telefone || '').replace(/\D/g, '');
    var telFmt = tel.startsWith('55') ? tel : '55' + tel;
    var statusMap = {confirmado:'Confirmado',separacao:'Em Separação',pronto:'Pronto',a_caminho:'A Caminho',entregue:'Entregue'};
    var badgeMap = {confirmado:'b-confirmado',separacao:'b-separacao',pronto:'b-pronto',a_caminho:'b-caminho',entregue:'b-entregue'};

    var statusBtn = '';
    if(p.status === 'confirmado') statusBtn = '<button class="status-btn separar" onclick="doStatus(' + p.id + ',\'separacao\',this)">📦 INICIAR SEPARAÇÃO</button>';
    else if(p.status === 'separacao') statusBtn = '<button class="status-btn pronto" onclick="doStatus(' + p.id + ',\'pronto\',this)">🎁 MARCAR COMO PRONTO</button>';
    else if(p.status === 'pronto') statusBtn = '<button class="status-btn sair" onclick="doStatus(' + p.id + ',\'a_caminho\',this)">🚚 SAÍ PARA ENTREGA</button>';
    else if(p.status === 'a_caminho') statusBtn = '<button class="status-btn entregar" onclick="doStatus(' + p.id + ',\'entregue\',this)">✅ CONFIRMAR ENTREGA</button>';

    var whatsMsg = encodeURIComponent('Olá ' + p.recebedor_nome + '! Sou o entregador do Araquari Cestas, estou a caminho com seu pedido ' + p.codigo + '.');

    var h = '<div class="ocard">';
    h += '<div class="ocard-top"><div><div class="ocard-code">' + p.codigo + '</div><div style="font-size:11px;color:var(--text3)">' + (p.cesta_nome||'') + ' · ' + (p.quantidade||1) + 'x</div></div><span class="ocard-badge ' + (badgeMap[p.status]||'') + '">' + (statusMap[p.status]||p.status) + '</span></div>';
    h += '<div class="ocard-body"><strong>📍 ' + (addr || 'Endereço não informado') + '</strong>';
    if(p.endereco_complemento) h += '<div>🏠 ' + p.endereco_complemento + '</div>';
    if(p.endereco_referencia) h += '<div style="color:var(--yellow)">📌 ' + p.endereco_referencia + '</div>';
    h += '<div style="margin-top:6px">👤 <strong>' + p.recebedor_nome + '</strong></div>';
    h += '<div>📞 ' + (p.recebedor_telefone || '-') + '</div></div>';

    if(hasGeo) {
        h += '<div class="ocard-coords"><span>' + lat.toFixed(6) + ', ' + lng.toFixed(6) + '</span><button class="copy-btn" onclick="copyC(' + lat + ',' + lng + ',this)">📋 Copiar</button></div>';
        h += '<div class="ocard-map" id="m-' + p.id + '"></div>';
    }

    h += '<div class="nav-row">';
    if(hasGeo) h += '<a class="nav-btn nav-google" href="https://www.google.com/maps/dir/?api=1&destination=' + lat + ',' + lng + '&travelmode=driving" target="_blank">📍 Maps</a>';
    if(hasGeo) h += '<a class="nav-btn nav-waze" href="https://www.waze.com/ul?ll=' + lat + ',' + lng + '&navigate=yes" target="_blank">🧭 Waze</a>';
    if(tel) h += '<a class="nav-btn nav-whats" href="https://wa.me/' + telFmt + '?text=' + whatsMsg + '" target="_blank">💬 WhatsApp</a>';
    h += '</div>';

    if(statusBtn) h += '<div class="status-action">' + statusBtn + '</div>';
    h += '</div>';
    return h;
}

function initMaps(list) {
    for(var i = 0; i < list.length; i++) {
        var p = list[i];
        var lat = parseFloat(p.latitude);
        var lng = parseFloat(p.longitude);
        if(!lat || !lng || lat === 0) continue;
        var el = document.getElementById('m-' + p.id);
        if(!el || maps[p.id]) continue;

        var m = L.map(el, {zoomControl:false, attributionControl:false, dragging:false, scrollWheelZoom:false, doubleClickZoom:false, touchZoom:false});
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19}).addTo(m);
        m.setView([lat, lng], 17);
        var icon = L.divIcon({html:'<div style="font-size:28px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))">📍</div>', iconSize:[28,28], iconAnchor:[14,28], className:''});
        L.marker([lat, lng], {icon:icon}).addTo(m);
        L.circle([lat, lng], {radius:25, color:'#3b82f6', fillColor:'#3b82f6', fillOpacity:0.1, weight:1}).addTo(m);
        maps[p.id] = m;
    }
}

function copyC(lat, lng, btn) {
    var t = lat.toFixed(6) + ', ' + lng.toFixed(6);
    if(navigator.clipboard) {
        navigator.clipboard.writeText(t).then(function() {
            btn.textContent = '✅ Copiado!';
            setTimeout(function() { btn.textContent = '📋 Copiar'; }, 1500);
        });
    } else {
        prompt('Coordenadas:', t);
    }
}

async function doStatus(id, newStatus, btn) {
    var msgs = {
        separacao: 'Iniciar separação deste pedido?',
        pronto: 'Marcar como pronto para entrega?',
        a_caminho: 'Confirmar saída para entrega?',
        entregue: 'Confirmar que foi entregue?'
    };
    if(!confirm(msgs[newStatus] || 'Confirmar?')) return;

    var origText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '⏳ Atualizando...';

    try {
        var res = await fetch(API + '/pedidos/' + id + '/status', {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json',
                'x-admin-token': TK
            },
            body: JSON.stringify({
                status: newStatus,
                observacao: 'Atualizado pelo entregador'
            })
        });

        if(!res.ok) {
            var errData = await res.json().catch(function() { return {}; });
            throw new Error(errData.error || 'Erro HTTP ' + res.status);
        }

        var data = await res.json();

        if(!data.success) {
            throw new Error(data.error || 'Falha ao atualizar');
        }

        var labels = {separacao:'📦 Em separação!',pronto:'🎁 Pronto!',a_caminho:'🚚 Saiu para entrega!',entregue:'✅ Entregue!'};
        toast(labels[newStatus] || 'Status atualizado!');
        btn.textContent = '✅ Feito!';
        setTimeout(function() { loadOrders(); }, 800);

    } catch(e) {
        toast('Erro: ' + e.message, 'error');
        btn.disabled = false;
        btn.textContent = origText;
    }
}

setInterval(function() {
    if(TK && document.getElementById('panel').style.display !== 'none') loadOrders();
}, 30000);

if(TK) {
    fetch(API+'/dashboard', {headers:{'x-admin-token':TK}})
        .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function() { showPanel(); })
        .catch(function() { doLogout(); });
}
</script>
</body>
</html>
